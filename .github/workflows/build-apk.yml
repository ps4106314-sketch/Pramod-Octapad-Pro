name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r25c

      - name: Grant execute permission for gradlew
        run: chmod +x "Pramod Octapad Pro /gradlew"

      - name: Build Debug APK
        run: |
          cd "Pramod Octapad Pro "
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Pramod-Octapad-Pro-debug
          path: "Pramod Octapad Pro /app/build/outputs/apk/debug/*.apk"
